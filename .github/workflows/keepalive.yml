name: Supabase Keep-Alive

on:
  schedule:
    # A cada 8 horas (00:00, 08:00, 16:00 UTC)
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_TABLE: ${{ secrets.SUPABASE_TABLE }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=ambiente,last_ping" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP Status: ${STATUS}"
          echo "Resposta: ${BODY}"

          if [ "$STATUS" -ne 200 ]; then
            echo "::error::Keep-alive falhou (HTTP ${STATUS})"
            exit 1
          fi

          echo "Keep-alive executado com sucesso."
